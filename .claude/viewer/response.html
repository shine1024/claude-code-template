<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>응답 결과</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #faf9f5;
      --surface:   #ffffff;
      --border:    #e8e3d8;
      --spine:     #d4ccba;
      --text:      #2b2926;
      --muted:     #8b8578;
      --accent:    #d97757;
      --accent-fg: #ffffff;
      --accent-hi: #c4593b;
      --link:      #b85a3f;
      --code-bg:   #f3efe6;
      --pre-bg:    #2b2926;
      --pre-fg:    #f0eee6;
      --radius:    8px;
      --shadow:    0 4px 24px rgba(43,41,38,0.08), 0 1px 4px rgba(43,41,38,0.05);
    }

    body {
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 12px 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .toolbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 4px;
    }
    .toolbar-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--accent);
    }
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toolbar-page {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
      border-radius: 50%;
      padding: 0;
      transition: background 0.12s, color 0.12s;
    }
    .toolbar-btn:hover { background: var(--code-bg); color: var(--accent); }

    .shutdown-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--accent);
      color: var(--accent-fg);
      text-align: center;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* ── 커스텀 모달 (IntelliJ Preview 등 confirm/alert 미지원 환경 대응) ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(43, 41, 38, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .modal-dialog {
      background: var(--surface);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      max-width: 420px;
      width: 100%;
      padding: 20px 20px 16px;
    }
    .modal-body {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      margin-bottom: 18px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .modal-btn {
      padding: 7px 16px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .modal-btn:hover { background: var(--code-bg); }
    .modal-btn.modal-ok {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }
    .modal-btn.modal-ok:hover { background: var(--accent-hi); border-color: var(--accent-hi); }

    .reader {
      display: flex;
      align-items: stretch;
      gap: 12px;
      width: 100%;
      flex: 1;
      min-height: 0;
    }

    .nav-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: var(--accent);
      color: var(--accent-fg);
      font-size: 25px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 12px rgba(217,119,87,0.30);
      user-select: none;
      flex-shrink: 0;
    }
    .nav-btn:hover:not(:disabled) { background: var(--accent-hi); border-color: var(--accent-hi); transform: scale(1.08); box-shadow: 0 6px 20px rgba(196,89,59,0.40); }
    .nav-btn:disabled { opacity: 0.35; cursor: default; box-shadow: none; transform: none; }
    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-self: center;
    }

    .book {
      flex: 1;
      display: flex;
      height: 100%;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
      min-height: 0;
    }

    .page {
      flex: 1;
      background: var(--surface);
      position: relative;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }
    .page-left { border-right: 1px solid var(--spine); }

    .page-scroll {
      position: absolute;
      inset: 0;
      padding: 16px 22px 16px;
      overflow-y: hidden;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
    }
    .page-scroll.scrollable { overflow-y: auto; }

    .page-num {
      position: absolute;
      bottom: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.04em;
      pointer-events: none;
      z-index: 2;
    }
    .page-left  .page-num { left: 12px; }
    .page-right .page-num { right: 12px; }

    .page h1 { font-size: 1.5em; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); letter-spacing: -0.02em; color: var(--text); }
    .page h2 { font-size: 1.2em; font-weight: 600; margin: 10px 0 4px; letter-spacing: -0.01em; color: var(--text); }
    .page h3 { font-size: 1.05em; font-weight: 600; margin: 12px 0 5px; color: var(--text); }
    .page p  { margin-bottom: 8px; }
    .page p.tool-head { margin-top: 20px; }
    .page-scroll > p.tool-head:first-child { margin-top: 0; }
    .page ul, .page ol { margin: 5px 0 8px 20px; }
    .page li { margin-bottom: 3px; }
    .page strong { font-weight: 700; }
    .page em     { font-style: italic; color: var(--muted); }
    .page a      { color: var(--link); text-decoration: none; }
    .page a:hover { text-decoration: underline; }
    .page code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85em; background: var(--code-bg); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; color: var(--accent-hi); }
    .page pre { background: var(--pre-bg); color: var(--pre-fg); padding: 12px 18px; border-radius: 6px; overflow-x: auto; margin: 9px 0; font-size: 0.84em; line-height: 1.5; position: relative; }
    .copy-btn {
      position: absolute;
      top: 8px; right: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      border: none;
      background: rgba(240, 238, 230, 0.10);
      color: var(--pre-fg);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      border-radius: 4px;
      padding: 0;
      opacity: 0;
      transition: opacity 0.15s, background 0.12s, color 0.12s;
    }
    .page pre:hover .copy-btn, .copy-btn:focus-visible { opacity: 1; }
    .copy-btn:hover { background: rgba(240, 238, 230, 0.22); }
    .copy-btn.copied { background: rgba(110, 231, 183, 0.22); color: #86efac; }
    @media (max-width: 768px) {
      .copy-btn { opacity: 0.7; }
    }
    .page pre code { background: none; border: none; padding: 0; color: inherit; font-size: inherit; }
    /* diff 블록 — 추가/삭제 라인 컬러링 */
    .page pre.diff-block { padding: 12px 0; }
    .page pre.diff-block code { display: block; }
    .page .diff-line {
      display: block;
      padding: 0 18px;
      white-space: pre;
      color: var(--pre-fg);
    }
    .page .diff-line.diff-add {
      background: rgba(110, 231, 183, 0.14);
      color: #86efac;
    }
    .page .diff-line.diff-del {
      background: rgba(252, 165, 165, 0.14);
      color: #fca5a5;
    }
    .page .diff-line.diff-ctx { opacity: 0.7; }
    .page blockquote { border-left: 3px solid var(--accent); padding-left: 16px; color: var(--muted); margin: 9px 0; }
    .page table { border-collapse: collapse; width: 100%; margin: 9px 0; font-size: 0.9em; }
    .page th { background: var(--code-bg); font-weight: 600; padding: 6px 12px; border: 1px solid var(--border); text-align: left; color: var(--text); }
    .page td { padding: 5px 12px; border: 1px solid var(--border); }
    .page hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    .hint { margin-top: 14px; font-size: 12px; font-weight: 500; color: var(--accent); letter-spacing: 0.04em; }

    /* ── 세션 탭 ── */
    .tabs {
      width: 100%;
      display: flex;
      gap: 4px;
      margin-bottom: 10px;
      overflow-x: auto;
      flex-shrink: 0;
      padding: 0 4px;
      scrollbar-width: thin;
    }
    .tabs:empty { display: none; }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 6px 6px 12px;
      border-radius: 6px 6px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      max-width: 260px;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .tab:hover:not(.active) { background: var(--code-bg); color: var(--text); }
    .tab.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .tab-label {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .tab .badge {
      flex-shrink: 0;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }
    .tab.active .badge { display: none; }
    .tab-close {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px; height: 18px;
      border: none;
      background: transparent;
      color: inherit;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      border-radius: 50%;
      padding: 0;
      opacity: 0.55;
      transition: background 0.12s, opacity 0.12s;
    }
    .tab-close:hover { background: rgba(0,0,0,0.12); opacity: 1; }
    .tab.active .tab-close { opacity: 0.85; }
    .tab.active .tab-close:hover { background: rgba(255,255,255,0.25); opacity: 1; }

    .empty-state {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--muted); font-size: 14px;
    }

    /* ── 대기 중 프로그레스 (상단 indeterminate 바) ── */
    .progress-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      overflow: hidden;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    body.waiting .progress-bar { opacity: 1; }
    .progress-bar::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 30%;
      background: var(--accent);
      animation: progress-slide 1.2s ease-in-out infinite;
    }
    @keyframes progress-slide {
      0%   { left: -30%; }
      100% { left: 100%; }
    }
    .book { transition: opacity 0.25s; }
    body.waiting .book {
      opacity: 0.75;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      body { padding: 10px 8px 8px; }
      .page-right { display: none; }
      .page-left  { border-right: none; }
      .page-scroll { padding: 24px 22px 32px; font-size: 13px; }
      .reader { gap: 6px; }
    }
  </style>
</head>
<body>

<div class="progress-bar" id="progress"></div>

<div class="toolbar">
  <span class="toolbar-title">응답 결과</span>
  <div class="toolbar-right">
    <span class="toolbar-page" id="page-indicator"></span>
    <button class="toolbar-btn" id="btn-shutdown" type="button" title="viewer 서버 종료 (다음 응답에 자동 재시작)" aria-label="viewer 서버 종료">⏻</button>
  </div>
</div>
<div class="tabs" id="tabs"></div>
<div class="reader">
  <div class="book">
    <div class="page page-left">
      <div class="page-scroll" id="page-left-scroll"></div>
      <div class="page-num" id="page-left-num"></div>
    </div>
    <div class="page page-right">
      <div class="page-scroll" id="page-right-scroll"></div>
      <div class="page-num" id="page-right-num"></div>
    </div>
  </div>
  <div class="nav-group">
    <button class="nav-btn" id="btn-prev" onclick="prevSpread()" title="이전 (←)">&#8249;</button>
    <button class="nav-btn" id="btn-next" onclick="nextSpread()" title="다음 (→)">&#8250;</button>
  </div>
</div>
<div class="hint">← → 키로도 이동</div>

<script>
  let pages = [], currentSpread = 0, lastMd = null;
  const isMobile = () => window.innerWidth <= 768;

  marked.setOptions({ breaks: true });

  // ── 문장 단위 개행 — 코드/인라인코드/링크 URL 보호 후 [.?!] + 공백 + 한글|영문대문자 패턴을 마크다운 hard break 로 치환
  function wrapSentences(md) {
    const fences = [];
    md = md.replace(/```[\s\S]*?```/g, m => { fences.push(m); return `␀F${fences.length - 1}␀`; });
    const inlines = [];
    md = md.replace(/`[^`\n]+`/g, m => { inlines.push(m); return `␀I${inlines.length - 1}␀`; });
    const urls = [];
    md = md.replace(/\]\([^)]*\)/g, m => { urls.push(m); return `␀U${urls.length - 1}␀`; });

    md = md.replace(/([.?!]) (?=[가-힣A-Z])/g, '$1  \n');

    md = md.replace(/␀U(\d+)␀/g, (_, i) => urls[+i]);
    md = md.replace(/␀I(\d+)␀/g, (_, i) => inlines[+i]);
    md = md.replace(/␀F(\d+)␀/g, (_, i) => fences[+i]);
    return md;
  }

  // ── 측정 기반 페이지 분할 — 페이지를 maxH 까지 빈틈없이 채운다.
  //    다음 블록이 안 들어가면 남은 공간만큼 문장/항목/코드줄/표행 단위로 잘라 채우고 나머지는 다음 페이지로 넘긴다.
  //    분할 불가능한 단일 거대 블록일 때만 그 페이지에 내부 스크롤을 허용한다.
  function paginate(md) {
    const scrollEl = document.querySelector('.page-scroll');
    const pageEl = document.querySelector('.page');
    if (!scrollEl || !pageEl) return [{ html: marked.parse(md), scrollable: false }];
    const maxH = scrollEl.clientHeight;
    const pageW = scrollEl.clientWidth;
    if (!maxH || !pageW) return [{ html: marked.parse(md), scrollable: false }];

    const sandbox = document.createElement('div');
    sandbox.className = 'page-scroll';
    Object.assign(sandbox.style, {
      position: 'absolute', left: '-99999px', top: '0', right: 'auto', bottom: 'auto',
      width: pageW + 'px',
      height: 'auto', maxHeight: 'none', overflow: 'visible',
      visibility: 'hidden', pointerEvents: 'none',
    });
    document.body.appendChild(sandbox);

    // html 조각의 렌더 높이(px) 측정
    const measure = (html) => { sandbox.innerHTML = html; return sandbox.scrollHeight; };

    sandbox.innerHTML = marked.parse(md);
    // 도구 호출 문단(아이콘 + **도구명**)에 구분용 상단 여백 클래스 부여
    [...sandbox.children].forEach(el => {
      if (el.tagName === 'P' && el.querySelector('strong') && /^(?:📖|📝|💾|▶|🔍|✓|🤖|🌐|⚙)\s/u.test(el.textContent)) {
        el.classList.add('tool-head');
      }
    });
    const blocks = [...sandbox.children].map(c => c.outerHTML);

    // 마지막 요소가 헤딩이면 떼어내 다음 페이지 머리로 넘긴다 (페이지 끝 고아 헤딩 방지)
    function trimTrailingHeading(html) {
      const w = document.createElement('div');
      w.innerHTML = html;
      const last = w.lastElementChild;
      if (last && /^H[1-6]$/.test(last.tagName)) {
        last.remove();
        return { body: w.innerHTML, heading: last.outerHTML };
      }
      return { body: html, heading: '' };
    }

    // 단일 블록을 avail 높이에 맞춰 [채울 부분, 남는 부분] 으로 분할. 불가능하면 null.
    function splitToFit(html, avail) {
      if (avail <= 0) return null;
      const wrap = document.createElement('div');
      wrap.innerHTML = html;
      const el = wrap.firstElementChild;
      if (!el) return null;
      const tag = el.tagName;

      // 코드 블록: 줄 단위 이진탐색
      if (tag === 'PRE') {
        const code = el.querySelector('code');
        if (!code) return null;
        const lines = code.textContent.split('\n');
        if (lines.length < 2) return null;
        const build = (k) => { const c = el.cloneNode(true); c.querySelector('code').textContent = lines.slice(0, k).join('\n'); return c.outerHTML; };
        const buildRest = (k) => { const c = el.cloneNode(true); c.querySelector('code').textContent = lines.slice(k).join('\n'); return c.outerHTML; };
        let n = 0, lo = 1, hi = lines.length;
        while (lo <= hi) {
          const mid = (lo + hi) >> 1;
          if (measure(build(mid)) <= avail) { n = mid; lo = mid + 1; } else hi = mid - 1;
        }
        if (n === 0) return null;
        if (n >= lines.length) return { fit: html, rest: '' };
        return { fit: build(n), rest: buildRest(n) };
      }

      // 리스트: 항목 단위
      if (tag === 'UL' || tag === 'OL') {
        const items = [...el.children];
        if (items.length < 2) return null;
        const build = (slice) => { const c = el.cloneNode(false); slice.forEach(it => c.appendChild(it.cloneNode(true))); return c.outerHTML; };
        let n = 0;
        for (let k = 1; k <= items.length; k++) {
          if (measure(build(items.slice(0, k))) <= avail) n = k; else break;
        }
        if (n === 0) return null;
        if (n >= items.length) return { fit: html, rest: '' };
        return { fit: build(items.slice(0, n)), rest: build(items.slice(n)) };
      }

      // 문단: 문장(<br>) 단위
      if (tag === 'P') {
        const parts = el.innerHTML.split(/<br\s*\/?>/i);
        if (parts.length < 2) return null;
        const build = (slice) => { const c = el.cloneNode(false); c.innerHTML = slice.join('<br>'); return c.outerHTML; };
        let n = 0;
        for (let k = 1; k <= parts.length; k++) {
          if (measure(build(parts.slice(0, k))) <= avail) n = k; else break;
        }
        if (n === 0) return null;
        if (n >= parts.length) return { fit: html, rest: '' };
        return { fit: build(parts.slice(0, n)), rest: build(parts.slice(n)) };
      }

      // 표: 본문 행 단위 (thead 유지)
      if (tag === 'TABLE') {
        const tbody = el.querySelector('tbody');
        const rows = tbody ? [...tbody.children] : [];
        if (rows.length < 2) return null;
        const thead = el.querySelector('thead');
        const build = (slice) => {
          const c = el.cloneNode(false);
          if (thead) c.appendChild(thead.cloneNode(true));
          const tb = document.createElement('tbody');
          slice.forEach(r => tb.appendChild(r.cloneNode(true)));
          c.appendChild(tb);
          return c.outerHTML;
        };
        let n = 0;
        for (let k = 1; k <= rows.length; k++) {
          if (measure(build(rows.slice(0, k))) <= avail) n = k; else break;
        }
        if (n === 0) return null;
        if (n >= rows.length) return { fit: html, rest: '' };
        return { fit: build(rows.slice(0, n)), rest: build(rows.slice(n)) };
      }

      return null;
    }

    const pages = [];
    let current = '';
    let i = 0;
    while (i < blocks.length) {
      const block = blocks[i];
      if (measure(current + block) <= maxH) {
        current += block;
        i++;
        continue;
      }
      // 현재 페이지에 안 들어감 — 남은 공간에 잘라서라도 채운다 (헤딩은 분할/하단배치 금지)
      const isHeading = /^<h[1-6]\b/.test(block);
      const avail = maxH - (current ? measure(current) : 0);
      const split = isHeading ? null : splitToFit(block, avail);
      if (split && split.fit) {
        pages.push({ html: current + split.fit, scrollable: false });
        current = '';
        blocks[i] = split.rest;
        if (!split.rest) i++;
        continue;
      }
      if (current) {
        // 현재 페이지를 닫고 새 페이지에서 block 부터 다시 — 끝이 고아 헤딩이면 다음 페이지로 넘김
        const t = trimTrailingHeading(current);
        if (t.body) {
          pages.push({ html: t.body, scrollable: false });
          current = t.heading;
        } else {
          // current 가 헤딩뿐 — 분할 불가한 큰 block 과 함께 스크롤 페이지로
          pages.push({ html: current + block, scrollable: true });
          current = '';
          i++;
        }
        continue;
      }
      // 새 페이지인데도 한 조각도 못 넣고 분할도 불가 → 통째로 스크롤 허용
      pages.push({ html: block, scrollable: true });
      i++;
    }
    if (current) pages.push({ html: current, scrollable: false });

    document.body.removeChild(sandbox);
    return pages.length ? pages : [{ html: '', scrollable: false }];
  }

  // ── 렌더링 ────────────────────────────────────────────────
  function perSpread() { return isMobile() ? 1 : 2; }

  function addCopyButtons(rootEl) {
    rootEl.querySelectorAll('pre:not(.diff-block)').forEach(pre => {
      if (pre.querySelector(':scope > .copy-btn')) return;
      const code = pre.querySelector('code');
      if (!code) return;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'copy-btn';
      btn.title = '복사';
      btn.setAttribute('aria-label', '코드 복사');
      btn.textContent = '📋';
      btn.onclick = async (e) => {
        e.stopPropagation();
        try {
          await navigator.clipboard.writeText(code.textContent);
          btn.classList.add('copied');
          btn.textContent = '✓';
        } catch (_) {
          btn.textContent = '✗';
        }
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.textContent = '📋';
        }, 1200);
      };
      pre.appendChild(btn);
    });
  }

  function highlightDiffs(rootEl) {
    rootEl.querySelectorAll('pre code.language-diff').forEach(code => {
      const text = code.textContent.replace(/\n$/, '');
      const lines = text.split('\n');
      code.innerHTML = lines.map(line => {
        const cls = line.startsWith('+') ? 'diff-line diff-add'
                  : line.startsWith('-') ? 'diff-line diff-del'
                  : 'diff-line diff-ctx';
        const safe = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return `<span class="${cls}">${safe || '&nbsp;'}</span>`;
      }).join('');
      code.parentElement.classList.add('diff-block');
    });
  }

  function setPage(scroll, num, idx) {
    const p = pages[idx];
    if (p) {
      scroll.innerHTML = p.html;
      scroll.scrollTop = 0;
      num.textContent = idx + 1;
      highlightDiffs(scroll);
      addCopyButtons(scroll);
      // 측정 오차·리사이즈 등으로 내용이 페이지를 넘치면 잘려서 안 보이지 않도록 스크롤 허용
      scroll.classList.toggle('scrollable', !!p.scrollable || scroll.scrollHeight > scroll.clientHeight + 1);
    } else {
      scroll.innerHTML = '';
      scroll.classList.remove('scrollable');
      num.textContent = '';
    }
  }

  function renderSpread() {
    const n = perSpread(), li = currentSpread * n, ri = li + 1, total = pages.length;
    setPage(document.getElementById('page-left-scroll'),  document.getElementById('page-left-num'),  li);
    if (!isMobile()) setPage(document.getElementById('page-right-scroll'), document.getElementById('page-right-num'), ri);
    else document.getElementById('page-right-num').textContent = '';

    const cur = n > 1 && pages[ri] ? `${li + 1}-${Math.min(ri + 1, total)}` : `${li + 1}`;
    document.getElementById('page-indicator').textContent = total ? `${cur} / ${total}` : '';

    document.getElementById('btn-prev').disabled = currentSpread === 0;
    document.getElementById('btn-next').disabled = (currentSpread + 1) * n >= total;
  }

  function loadMd(md) {
    requestAnimationFrame(() => {
      pages = paginate(wrapSentences(md));
      currentSpread = 0;
      renderSpread();
    });
  }

  function prevSpread() { if (currentSpread > 0) { currentSpread--; renderSpread(); } }
  function nextSpread() { if ((currentSpread + 1) * perSpread() < pages.length) { currentSpread++; renderSpread(); } }

  // ── 리사이즈 재분할 — 보던 위치(현재 왼쪽 페이지 머리글)를 앵커로 보존 ──
  function textOf(html) {
    const d = document.createElement('div');
    d.innerHTML = html;
    return (d.textContent || '').replace(/\s+/g, ' ').trim();
  }
  function repaginate() {
    if (lastMd == null) { renderSpread(); return; }
    const cur = pages[currentSpread * perSpread()];
    const anchor = cur ? textOf(cur.html).slice(0, 30) : '';
    requestAnimationFrame(() => {
      pages = paginate(wrapSentences(lastMd));
      const n = perSpread();
      let idx = 0;
      if (anchor) {
        idx = pages.findIndex(p => textOf(p.html).startsWith(anchor));
        if (idx < 0) idx = pages.findIndex(p => textOf(p.html).includes(anchor.slice(0, 16)));
        if (idx < 0) idx = 0;
      }
      currentSpread = Math.floor(idx / n);
      renderSpread();
    });
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  prevSpread();
    if (e.key === 'ArrowRight') nextSpread();
  });

  // resize 시 페이지 폭/높이가 바뀌므로 paginate 부터 다시 — 짧은 debounce
  let resizeTimer = null;
  function scheduleRepaginate() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(repaginate, 150);
  }
  window.addEventListener('resize', scheduleRepaginate);
  // IntelliJ JCEF 등 임베디드 브라우저는 window resize 가 안 뜨는 경우가 있어 ResizeObserver 로도 감지
  if (window.ResizeObserver) {
    const bookEl = document.querySelector('.book');
    if (bookEl) new ResizeObserver(scheduleRepaginate).observe(bookEl);
  }

  // ── 커스텀 다이얼로그 (IntelliJ Preview 등 native confirm/alert 미지원 환경 대응) ──
  function customDialog(message, { okText = '확인', cancelText = '취소' } = {}) {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      const dlg = document.createElement('div');
      dlg.className = 'modal-dialog';
      dlg.setAttribute('role', 'dialog');
      dlg.setAttribute('aria-modal', 'true');
      const body = document.createElement('div');
      body.className = 'modal-body';
      body.textContent = message;
      const actions = document.createElement('div');
      actions.className = 'modal-actions';
      let cancelBtn = null;
      if (cancelText) {
        cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.className = 'modal-btn modal-cancel';
        cancelBtn.textContent = cancelText;
        actions.appendChild(cancelBtn);
      }
      const okBtn = document.createElement('button');
      okBtn.type = 'button';
      okBtn.className = 'modal-btn modal-ok';
      okBtn.textContent = okText;
      actions.appendChild(okBtn);
      dlg.appendChild(body);
      dlg.appendChild(actions);
      overlay.appendChild(dlg);
      document.body.appendChild(overlay);

      const close = (result) => {
        overlay.remove();
        document.removeEventListener('keydown', onKey);
        resolve(result);
      };
      const onKey = (e) => {
        if (e.key === 'Escape' && cancelText) { e.preventDefault(); close(false); }
        if (e.key === 'Enter') { e.preventDefault(); close(true); }
      };
      okBtn.onclick = () => close(true);
      if (cancelBtn) cancelBtn.onclick = () => close(false);
      overlay.onclick = (e) => { if (e.target === overlay && cancelText) close(false); };
      document.addEventListener('keydown', onKey);
      setTimeout(() => okBtn.focus(), 50);
    });
  }
  const customConfirm = (msg) => customDialog(msg, { okText: '확인', cancelText: '취소' });
  const customAlert   = (msg) => customDialog(msg, { okText: '확인', cancelText: '' });

  // ── 폴링 (세션 인덱스 기반) ─────────────────────────────
  let sessions = [], activeId = null;
  let shuttingDown = false;
  let lastMaxUpdated = 0; // 지금까지 본 가장 최신 updated_at — 새 응답 도착 감지용
  const seenAt = {}; // session_id → 마지막으로 본 updated_at (배지 판정용)

  // ── 로컬에서 숨긴 세션 (서버 DELETE 실패해도 화면에서 치울 수 있도록) ──
  const HIDDEN_KEY = 'claude-viewer-hidden-sessions';
  // id → 숨긴 시점의 updated_at. 이후 그보다 새 응답(updated_at 증가)이 오면 자동 해제.
  let hiddenAt = {};
  try {
    const raw = localStorage.getItem(HIDDEN_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) {
        // 구버전(id 배열) 마이그레이션 — 임계값 0 이면 새 응답 시 즉시 해제
        for (const id of parsed) hiddenAt[id] = 0;
      } else if (parsed && typeof parsed === 'object') {
        hiddenAt = parsed;
      }
    }
  } catch (_) {}
  function saveHidden() {
    try { localStorage.setItem(HIDDEN_KEY, JSON.stringify(hiddenAt)); } catch (_) {}
  }

  async function fetchText(file) {
    try {
      // cache: 'no-store' — IntelliJ JCEF 등이 응답을 캐시하는 걸 방지
      const res = await fetch(`${file}?t=` + Date.now(), { cache: 'no-store' });
      if (!res.ok) return null;
      // 서버가 charset 헤더를 안 보내면 브라우저가 다른 인코딩으로 추측할 수 있어 arrayBuffer + TextDecoder('utf-8') 로 명시 디코딩
      const buf = await res.arrayBuffer();
      return new TextDecoder('utf-8').decode(buf);
    } catch (_) { return null; }
  }

  let shutdownPingTimer = null;

  function showShutdownBanner() {
    if (!document.getElementById('shutdown-banner')) {
      const banner = document.createElement('div');
      banner.id = 'shutdown-banner';
      banner.className = 'shutdown-banner';
      banner.textContent = '서버가 종료되었습니다. 다음 Claude 응답이 들어오면 자동으로 재시작됩니다.';
      document.body.insertBefore(banner, document.body.firstChild);
    }
    // JCEF 등에서는 connection refused 가 캐시되거나 폴링이 throttling 될 수 있어,
    // 별도 ping 루프로 서버 부활을 적극 감지한 뒤 페이지 자체를 새로 띄워 깨끗하게 복귀한다.
    if (shutdownPingTimer) return;
    shutdownPingTimer = setInterval(async () => {
      try {
        const res = await fetch('/sessions.json?ping=' + Date.now(), { cache: 'no-store' });
        if (res.ok) {
          clearInterval(shutdownPingTimer);
          shutdownPingTimer = null;
          location.reload();
        }
      } catch (_) {}
    }, 1500);
  }

  function hideShutdownBanner() {
    const banner = document.getElementById('shutdown-banner');
    if (banner) banner.remove();
    shuttingDown = false;
    if (shutdownPingTimer) { clearInterval(shutdownPingTimer); shutdownPingTimer = null; }
  }

  document.getElementById('btn-shutdown').onclick = async () => {
    if (!(await customConfirm('viewer 서버를 종료할까요?\n다음 Claude 응답이 들어오면 자동으로 재시작됩니다.'))) return;
    let serverOk = false;
    try {
      await apiReady;
      const res = await fetch(`${apiBase}/server/shutdown`, { method: 'POST' });
      // 연결이 끊겨도 ok 로 본다 (정상 종료 흐름)
      serverOk = res.ok || res.status === 204;
    } catch (_) {
      // 종료 직후 fetch 가 실패하는 건 정상
      serverOk = true;
    }
    if (!serverOk) {
      await customAlert(`서버가 종료 요청을 처리하지 못했습니다.\n옛 버전 서버가 떠 있을 가능성이 큽니다.\n수동으로 ${location.port} 포트 프로세스를 종료해주세요.`);
      return;
    }
    shuttingDown = true;
    showShutdownBanner();
  };

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderTabs() {
    const el = document.getElementById('tabs');
    el.innerHTML = sessions.map(s => {
      const isActive = s.id === activeId;
      const hasNew = !isActive && seenAt[s.id] !== s.updated_at;
      const label = (s.label || s.id.slice(0, 8)) || '세션';
      const waitingAttr = s.waiting ? '1' : '0';
      return `<div class="tab ${isActive ? 'active' : ''}" data-id="${escapeHtml(s.id)}" data-waiting="${waitingAttr}">`
           + `<span class="tab-label">${escapeHtml(label)}</span>`
           + (hasNew ? '<span class="badge"></span>' : '')
           + `<button class="tab-close" type="button" title="세션 닫기" aria-label="세션 닫기">×</button>`
           + `</div>`;
    }).join('');
    el.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = (e) => {
        if (e.target.closest('.tab-close')) return;
        selectTab(tab.dataset.id);
      };
    });
    el.querySelectorAll('.tab-close').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const tab = btn.closest('.tab');
        if (tab) closeTab(tab.dataset.id, tab.dataset.waiting === '1');
      };
    });
  }

  async function closeTab(id, waiting) {
    const msg = waiting
      ? '응답을 받는 중입니다. 그래도 삭제하시겠습니까?\n응답 파일도 함께 삭제됩니다.'
      : '이 세션을 삭제하시겠습니까?\n응답 파일도 함께 삭제됩니다.';
    if (!(await customConfirm(msg))) return;

    let serverOk = false;
    let detail = '';
    try {
      await apiReady;
      const res = await fetch(`${apiBase}/sessions/${encodeURIComponent(id)}`, { method: 'DELETE' });
      serverOk = res.ok || res.status === 204;
      if (!serverOk) detail = 'HTTP ' + res.status;
    } catch (err) {
      detail = (err && err.message) ? err.message : String(err);
    }

    if (!serverOk) {
      // 옛 버전 서버이거나 응답 불가 — 화면에서만이라도 치울지 묻는다
      const ok = await customConfirm(
        `서버가 세션을 삭제하지 못했습니다 (${detail}).\n옛 버전 서버가 떠 있을 가능성이 큽니다.\n\n탭을 화면에서만 숨길까요?\n(실제 파일은 24시간 후 자동 정리되며, 새 서버가 뜨면 정상 삭제도 가능합니다)`
      );
      if (!ok) return;
      const cur = sessions.find(s => s.id === id);
      hiddenAt[id] = cur ? (cur.updated_at || 0) : 0;
      saveHidden();
    }

    if (id === activeId) {
      activeId = null;
      lastMd = null;
    }
    delete seenAt[id];
    await pollSessions();
  }

  function selectTab(id) {
    if (id === activeId) return;
    activeId = id;
    lastMd = null;
    const s = sessions.find(x => x.id === id);
    if (s) seenAt[id] = s.updated_at;
    renderTabs();
    pollActiveResponse();
    updateWaiting();
  }

  function updateWaiting() {
    const s = sessions.find(x => x.id === activeId);
    document.body.classList.toggle('waiting', !!(s && s.waiting));
  }

  function showEmptyState() {
    const msg = '<div class="empty-state">활성 세션이 없습니다. Claude Code 에서 응답을 받으면 여기에 표시됩니다.</div>';
    document.getElementById('page-left-scroll').innerHTML = msg;
    document.getElementById('page-right-scroll').innerHTML = '';
    document.getElementById('page-left-num').textContent = '';
    document.getElementById('page-right-num').textContent = '';
    document.getElementById('page-indicator').textContent = '';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
  }

  async function pollActiveResponse() {
    if (!activeId) { showEmptyState(); return; }
    const md = await fetchText(`response-${activeId}.md`);
    if (md && md !== lastMd) {
      lastMd = md;
      loadMd(md);
      const s = sessions.find(x => x.id === activeId);
      if (s) seenAt[activeId] = s.updated_at;
    } else if (!md && lastMd === null) {
      showEmptyState();
    }
  }

  async function pollSessions() {
    const raw = await fetchText('sessions.json');
    if (raw !== null && shuttingDown) hideShutdownBanner();
    let all = [];
    try { all = raw ? JSON.parse(raw) : []; } catch (_) { all = []; }

    // 숨긴 뒤 새 응답이 온 세션은 해제하고(살아 있는 세션 재등장), sessions.json 에서 사라진 id 도 정리
    if (Object.keys(hiddenAt).length) {
      const byId = new Map(all.map(s => [s.id, s]));
      let changed = false;
      for (const id of Object.keys(hiddenAt)) {
        const s = byId.get(id);
        if (!s) { delete hiddenAt[id]; changed = true; }                                  // 더 이상 존재하지 않음
        else if ((s.updated_at || 0) > hiddenAt[id]) { delete hiddenAt[id]; changed = true; } // 새 응답 도착 → 재등장
      }
      if (changed) saveHidden();
    }

    sessions = all.filter(s => hiddenAt[s.id] === undefined);

    // 활성 세션이 없으면 가장 최근 세션으로 자동 선택 (탭 첫 진입 시에만)
    if (!activeId && sessions.length) {
      activeId = sessions[0].id;
      seenAt[activeId] = sessions[0].updated_at;
      lastMd = null;
    }
    // 활성 세션이 자동 정리됐으면 가장 최근으로 전환
    if (activeId && !sessions.find(s => s.id === activeId)) {
      activeId = sessions.length ? sessions[0].id : null;
      lastMd = null;
      if (activeId) seenAt[activeId] = sessions.find(s => s.id === activeId).updated_at;
    }

    // 새 응답이 도착하면(최신 updated_at 갱신) 그 세션으로 자동 전환 —
    // 탭을 닫았거나 다른 탭을 보고 있어도 진행 중인 응답을 놓치지 않는다.
    const newest = sessions.reduce((a, b) => (!a || b.updated_at > a.updated_at) ? b : a, null);
    if (newest && newest.updated_at > lastMaxUpdated) {
      if (lastMaxUpdated !== 0 && newest.id !== activeId) {
        activeId = newest.id;
        seenAt[activeId] = newest.updated_at;
        lastMd = null;
      }
      lastMaxUpdated = newest.updated_at;
    }

    renderTabs();
    await pollActiveResponse();
    updateWaiting();
  }

  // ── 다른 서버(예: IntelliJ 내장 서버 63342)에서 열렸으면 viewer 전용 API 를 절대주소로 라우팅 ──
  // 정적 파일(sessions.json·응답)은 그 서버가 그대로 서빙하고, 삭제·종료만 viewer 서버(meta.port)로 보낸다.
  let apiBase = '';
  const apiReady = (async () => {
    try {
      const res = await fetch('viewer-meta.json?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) return;
      const meta = JSON.parse(await res.text());
      if (meta && meta.port && String(meta.port) !== location.port) {
        apiBase = `http://127.0.0.1:${meta.port}`;
      }
    } catch (_) {}
  })();

  pollSessions();
  setInterval(pollSessions, 800);

  // IntelliJ JCEF 등 임베디드 브라우저에서 hidden 상태일 때 setInterval 이 throttling 되거나
  // 멈추는 경우가 있어, 다시 보이거나 포커스 받는 순간 즉시 한 번 강제 폴링한다.
  document.addEventListener('visibilitychange', () => { if (!document.hidden) pollSessions(); });
  window.addEventListener('focus', () => pollSessions());
</script>
</body>
</html>
